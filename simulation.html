<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Underfill 3D 模擬室 (3D Simulation Lab)</title>
  <link rel="stylesheet" href="src/css/simulation.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- Header -->
  <header class="sim-header">
    <a href="index.html" class="sim-back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>
      返回訓練
    </a>
    <h1>Underfill 3D 模擬室</h1>
  </header>

  <!-- Body -->
  <div class="sim-body">

    <!-- Sidebar -->
    <aside class="sim-sidebar">
      <div class="sim-sidebar-section">
        <div class="sim-sidebar-title">場景選擇</div>
        <nav id="scene-nav"></nav>
      </div>
      <div class="sim-sidebar-section">
        <div class="sim-sidebar-title">參數控制</div>
        <div id="param-panel"></div>
      </div>
      <div id="scene-status" class="scene-status">就緒</div>
    </aside>

    <!-- 3D Viewport -->
    <div class="sim-viewport">
      <div id="scene-container"></div>
    </div>

  </div>

  <!-- Controls Bar -->
  <footer class="sim-controls">
    <div id="controls-bar"></div>
  </footer>

  <!-- Three.js Entry -->
  <script type="module" src="src/js/simulation/main.js"></script>
</body>
</html>
