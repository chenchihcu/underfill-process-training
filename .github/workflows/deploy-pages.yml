name: Deploy to GitHub Pages
on:
  push:
    branches: [main]

# Pages on this repo is configured as "Deploy from a branch" (gh-pages),
# so we publish the dashboard/ static site to that branch rather than using
# the Actions-source deploy (which fails at job startup when the Pages source
# is set to a branch). This needs no Settings change.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish dashboard/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          # adds .nojekyll automatically so the static files are served as-is
