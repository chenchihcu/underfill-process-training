<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f766e">
  <title>Underfill Process Learning & Engineering Decision Support</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="topbar">
    <div>
      <p class="eyebrow"><span data-i18n="app.training"></span> + <span data-i18n="app.controlled"></span></p>
      <h1 data-i18n="app.title"></h1>
      <p class="subtitle" data-i18n="app.subtitle"></p>
    </div>
    <div class="topbar-actions">
      <div class="version-block" aria-label="Build information">
        <span><span data-i18n="app.spec"></span> <strong id="specVersion"></strong></span>
        <span><span data-i18n="app.version"></span> <strong id="appVersion"></strong></span>
      </div>
      <label class="language-control">
        <span class="sr-only">Language</span>
        <select id="languageSelect" aria-label="Language">
          <option value="zh-Hant">繁體中文</option>
          <option value="en">English</option>
        </select>
      </label>
    </div>
  </header>

  <div class="app-shell">
    <nav class="sidebar" aria-label="Primary navigation">
      <p class="nav-group" data-i18n="app.training"></p>
      <button class="nav-item active" type="button" data-section="overview" aria-current="page"><span class="nav-icon">01</span><span data-i18n="nav.overview"></span></button>
      <button class="nav-item" type="button" data-section="learning"><span class="nav-icon">02</span><span data-i18n="nav.learning"></span></button>
      <button class="nav-item" type="button" data-section="specifications"><span class="nav-icon">03</span><span data-i18n="nav.specifications"></span></button>
      <p class="nav-group" data-i18n="app.controlled"></p>
      <button class="nav-item" type="button" data-section="recommendation"><span class="nav-icon">04</span><span data-i18n="nav.recommendation"></span></button>
      <button class="nav-item" type="button" data-section="inspection"><span class="nav-icon">05</span><span data-i18n="nav.inspection"></span></button>
      <button class="nav-item" type="button" data-section="records"><span class="nav-icon">06</span><span data-i18n="nav.records"></span><span class="nav-badge" id="recordBadge">0</span></button>
      <a class="nav-item nav-item-primary" href="./simulation.html"><span class="nav-icon">3D</span><span data-i18n="nav.simulator"></span></a>
    </nav>

    <main id="main" class="main-content" tabindex="-1">
      <section id="overview" class="page active" aria-labelledby="overviewTitle">
        <div class="hero-panel">
          <div>
            <p class="eyebrow" data-i18n="app.controlled"></p>
            <h2 id="overviewTitle" data-i18n="overview.title"></h2>
            <p class="lead" data-i18n="overview.body"></p>
          </div>
          <a class="button button-primary" href="./simulation.html" data-i18n="nav.simulator"></a>
        </div>
        <div class="metric-grid">
          <article class="metric-card"><span class="metric-number">1</span><h3 data-i18n="overview.card1"></h3><p id="overviewSpec"></p></article>
          <article class="metric-card"><span class="metric-number">ID</span><h3 data-i18n="overview.card2"></h3><p>IndexedDB · JSON · CSV</p></article>
          <article class="metric-card"><span class="metric-number">9</span><h3 data-i18n="overview.card3"></h3><p>Underfill · SMT · Defects</p></article>
          <article class="metric-card"><span class="metric-number">≈</span><h3 data-i18n="overview.card4"></h3><p data-i18n="sim.notCalibrated"></p></article>
        </div>
        <div class="notice notice-warning" role="note"><strong>Boundary</strong><span data-i18n="overview.trainingNotice"></span></div>
      </section>

      <section id="learning" class="page" aria-labelledby="learningTitle" hidden>
        <div class="page-heading"><div><p class="eyebrow" data-i18n="app.training"></p><h2 id="learningTitle" data-i18n="learning.title"></h2><p data-i18n="learning.subtitle"></p></div><span class="status-chip">8 MODULES</span></div>
        <div id="lessonGrid" class="lesson-grid"></div>
      </section>

      <section id="specifications" class="page" aria-labelledby="specTitle" hidden>
        <div class="page-heading"><div><p class="eyebrow" data-i18n="app.controlled"></p><h2 id="specTitle" data-i18n="spec.title"></h2></div><span class="status-chip status-controlled">CONTROLLED</span></div>
        <div id="specCards" class="spec-groups"></div>
      </section>

      <section id="recommendation" class="page" aria-labelledby="recommendationTitle" hidden>
        <div class="page-heading"><div><p class="eyebrow" data-i18n="app.controlled"></p><h2 id="recommendationTitle" data-i18n="recommendation.title"></h2></div></div>
        <form id="recommendationForm" class="form-card">
          <div class="form-grid">
            <label><span data-i18n="recommendation.package"></span><select name="packageType" required><option value="">—</option><option value="WLCSP">WLCSP</option><option value="FLIP_CHIP">Flip Chip</option><option value="BGA">BGA</option><option value="QFN">QFN</option></select></label>
            <label><span data-i18n="recommendation.pitch"></span><input name="pitchMm" type="number" min="0.01" step="0.01"></label>
            <label><span data-i18n="recommendation.ball"></span><input name="ballSizeMm" type="number" min="0.01" step="0.01"></label>
            <label><span data-i18n="recommendation.standoff"></span><input name="standoffMm" type="number" min="0.01" step="0.01"></label>
            <label><span data-i18n="recommendation.width"></span><input name="packageWidthMm" type="number" min="0.1" step="0.1"></label>
            <label><span data-i18n="recommendation.length"></span><input name="packageLengthMm" type="number" min="0.1" step="0.1"></label>
            <label><span data-i18n="recommendation.clearance"></span><input name="edgeClearanceMm" type="number" min="0" step="0.1"></label>
            <label><span data-i18n="recommendation.reliability"></span><select name="reliabilityClass"><option value="">—</option><option>Consumer</option><option>Industrial</option><option>Automotive</option></select></label>
            <label><span data-i18n="recommendation.environment"></span><select name="environment"><option value="">—</option><option>Controlled indoor</option><option>Thermal cycling</option><option>High vibration</option></select></label>
            <label><span data-i18n="recommendation.material"></span><input name="material" value="UF3808"></label>
            <label><span data-i18n="recommendation.profile"></span><input name="processProfile" value="UF-Standard"></label>
            <label class="check-label"><input name="fullUnderfill" type="checkbox"><span data-i18n="recommendation.full"></span></label>
          </div>
          <button class="button button-primary" type="submit" data-i18n="recommendation.run"></button>
        </form>
        <div id="recommendationResult" class="result-panel" aria-live="polite" hidden></div>
      </section>

      <section id="inspection" class="page" aria-labelledby="inspectionTitle" hidden>
        <div class="page-heading"><div><p class="eyebrow" data-i18n="app.controlled"></p><h2 id="inspectionTitle" data-i18n="inspection.title"></h2></div></div>
        <form id="inspectionForm" class="form-card">
          <div class="form-grid">
            <label><span data-i18n="inspection.sample"></span><input name="sampleId" maxlength="80" required></label>
            <label><span data-i18n="inspection.batch"></span><input name="batchId" maxlength="80" required></label>
            <label><span data-i18n="inspection.lot"></span><input name="materialLot" maxlength="80" required></label>
            <label><span data-i18n="inspection.fillet"></span><input name="filletHeightPercent" type="number" min="0" max="100" value="60" required></label>
            <label><span data-i18n="inspection.perimeter"></span><input name="perimeterPercent" type="number" min="0" max="100" value="100" required></label>
            <label><span data-i18n="inspection.void"></span><input name="voidAreaPercent" type="number" min="0" max="100" step="0.1" value="10" required></label>
          </div>
          <fieldset><legend data-i18n="inspection.requiredTrace"></legend><div id="traceFields" class="form-grid compact"></div></fieldset>
          <div class="check-grid">
            <label class="check-label"><input name="crack" type="checkbox"><span data-i18n="inspection.crack"></span></label>
            <label class="check-label"><input name="contamination" type="checkbox"><span data-i18n="inspection.contamination"></span></label>
            <label class="check-label"><input name="clearanceBreach" type="checkbox"><span data-i18n="inspection.clearance"></span></label>
            <label class="check-label"><input name="topologyAcceptable" type="checkbox" checked><span data-i18n="inspection.topology"></span></label>
            <label class="check-label"><input name="locationAcceptable" type="checkbox" checked><span data-i18n="inspection.location"></span></label>
            <label class="check-label"><input name="csamAcceptable" type="checkbox" checked><span data-i18n="inspection.csam"></span></label>
          </div>
          <div class="form-grid">
            <label><span data-i18n="inspection.csamDisposition"></span><input name="csamDisposition" maxlength="120"></label>
            <label><span data-i18n="inspection.notes"></span><textarea name="notes" maxlength="1000" rows="3"></textarea></label>
          </div>
          <div class="inspection-actions">
            <div id="inspectionPreview" class="preview-card" aria-live="polite"></div>
            <button id="recordInspectionButton" class="button button-primary" type="submit" data-i18n="app.save"></button>
          </div>
        </form>
      </section>

      <section id="records" class="page" aria-labelledby="recordsTitle" hidden>
        <div class="page-heading"><div><p class="eyebrow" data-i18n="app.controlled"></p><h2 id="recordsTitle" data-i18n="records.title"></h2></div></div>
        <div class="notice notice-warning"><span data-i18n="app.storageWarning"></span></div>
        <div class="record-summary">
          <div><span data-i18n="records.total"></span><strong id="totalCount">0</strong></div>
          <div class="pass"><span data-i18n="records.pass"></span><strong id="passCount">0</strong></div>
          <div class="reject"><span data-i18n="records.reject"></span><strong id="rejectCount">0</strong></div>
        </div>
        <div class="toolbar">
          <button id="exportJson" class="button button-secondary" type="button" data-i18n="app.exportJson"></button>
          <button id="exportCsv" class="button button-secondary" type="button" data-i18n="app.exportCsv"></button>
          <label class="button button-secondary file-button"><span data-i18n="app.import"></span><input id="importJson" type="file" accept="application/json,.json"></label>
        </div>
        <div class="table-wrap"><table><thead><tr><th>ID</th><th data-i18n="inspection.sample"></th><th data-i18n="inspection.batch"></th><th data-i18n="app.spec"></th><th>Result</th><th>Time</th></tr></thead><tbody id="recordRows"></tbody></table></div>
      </section>
    </main>
  </div>

  <dialog id="sourceDialog" class="source-dialog"><form method="dialog"><div class="dialog-heading"><h2 data-i18n="app.source"></h2><button class="icon-button" value="close" aria-label="Close">×</button></div><dl id="sourceDetails"></dl><button class="button button-primary" value="close" data-i18n="app.close"></button></form></dialog>
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  <div id="updateNotice" class="update-notice" role="status" hidden><span>A new verified version is ready.</span><button id="reloadApp" type="button">Reload</button></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
